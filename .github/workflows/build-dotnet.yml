name: Dotnet Build Workflow

on:
  workflow_call:

    inputs:
      dotnet-version:
        required: false
        type: string
        default: "10.0.x"
        description: "The .NET SDK version to install for the workflow"

      test-projects:
        required: true
        type: string
        description: "JSON array of test project paths to run coverage and test jobs for"

      coverlet-runsettings-file:
        required: false
        type: string
        default: coverlet.runsettings
        description: "Path to the Coverlet runsettings file for coverage collection"

      run-pack:
        required: false
        type: boolean
        default: false
        description: "Whether to run the optional NuGet pack job"

      pack-folders:
        required: false
        type: string
        default: '["src/libs"]'
        description: "JSON array of folders to search for .nupkg files"

permissions:
  contents: read
  packages: write
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Cache NuGet
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Test
      run: dotnet test --configuration Release --no-build --no-restore --logger "trx;LogFileName=test-results.trx"

    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      with:
        name: Tests Results
        path: '**/*.trx'
        reporter: dotnet-trx

  coverage:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        test_path: ${{ fromJson(inputs.test-projects) }}

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Cache NuGet
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

    - name: Restore
      run: dotnet restore ${{ matrix.test_path }}

    - name: Build
      run: |
        dotnet build ${{ matrix.test_path }} \
          --configuration Release \
          --no-restore

    - name: Run coverage
      run: |
        dotnet test ${{ matrix.test_path }} \
          --configuration Release \
          --no-build \
          --no-restore \
          --collect:"XPlat Code Coverage" \
          --settings ${{ inputs.coverlet-runsettings-file }}

    - name: Normalize coverage
      run: |
        mv ${{ matrix.test_path }}/TestResults/**/coverage.cobertura.xml \
           ${{ matrix.test_path }}/TestResults/coverage.cobertura.xml

        sed -i '/filename="/ s|filename="${{ github.workspace }}/src/|filename="src/|g' \
          ${{ matrix.test_path }}/TestResults/coverage.cobertura.xml

    - name: Artifact name
      id: sanitize
      run: |
        SAFE_NAME=$(echo "${{ matrix.test_path }}" | sed 's#[/:<>|*?"\\\r\n]#-#g')
        echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT

    - name: Show build number
      run: |
        echo "Build number: ${{ github.run_id }}"

    - name: Upload coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-${{ steps.sanitize.outputs.safe_name }}
        path: ${{ matrix.test_path }}/TestResults/coverage.cobertura.xml

  merge-coverage:
    needs: coverage
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        path: coverage

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Merge
      run: |
        reportgenerator \
          -reports:"coverage/**/coverage.cobertura.xml" \
          -targetdir:"coverage-report" \
          -reporttypes:"Html;Cobertura"

    - uses: actions/upload-artifact@v4
      with:
        name: coverage-html
        path: coverage-report

    - name: Upload to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage-report/Cobertura.xml
        flags: unit_tests
        fail_ci_if_error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pack:
    if: ${{ inputs.run-pack }}
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

    - run: dotnet restore
    - run: dotnet build --configuration Release --no-restore
    - run: dotnet pack --configuration Release --no-build --no-restore

    - name: Stage NuGet packages
      run: |
        mkdir -p nupkg-staging
        echo "Staging NuGet packages from folders: ${{ inputs.pack-folders }}"
        echo '${{ inputs.pack-folders }}' | jq -r '.[]' | while IFS= read -r folder; do
          echo "Processing folder: $folder"
          if [ -d "$folder" ]; then
            find "$folder" -name "*.nupkg" -print -exec cp {} nupkg-staging/ \;
          else
            echo "Warning: Folder '$folder' does not exist, skipping"
          fi
        done
        echo "Staging complete. Files in nupkg-staging:"
        ls -la nupkg-staging/ || echo "No .nupkg files found"

    - uses: actions/upload-artifact@v4
      with:
        name: NugetPackages
        path: nupkg-staging/*.nupkg
