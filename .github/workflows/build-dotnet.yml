name: Dotnet Build Template

on:
  workflow_call:

    inputs:
      dotnet-version:
        required: false
        type: string
        default: "10.0.x"

      test-projects:
        required: true
        type: string

      coverlet-runsettings-file:
        required: false
        type: string
        default: coverlet.runsettings

      run-pack:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Cache NuGet
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Test
      run: dotnet test --configuration Release --no-build --no-restore --logger "trx;LogFileName=test-results.trx"

    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      with:
        name: Tests Results
        path: '**/*.trx'
        reporter: dotnet-trx

  coverage:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        test_path: ${{ fromJson(inputs.test-projects) }}

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Cache NuGet
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

    - name: Restore
      run: dotnet restore ${{ matrix.test_path }}

    - name: Build
      run: |
        dotnet build ${{ matrix.test_path }} \
          --configuration Release \
          --no-restore

    - name: Run coverage
      run: |
        dotnet test ${{ matrix.test_path }} \
          --configuration Release \
          --no-build \
          --no-restore \
          --collect:"XPlat Code Coverage" \
          --settings ${{ inputs.coverlet-runsettings-file }}

    - name: Normalize coverage
      run: |
        mv ${{ matrix.test_path }}/TestResults/**/coverage.cobertura.xml \
           ${{ matrix.test_path }}/TestResults/coverage.cobertura.xml

        sed -i '/filename="/ s|filename="${{ github.workspace }}/src/|filename="src/|g' \
          ${{ matrix.test_path }}/TestResults/coverage.cobertura.xml

    - name: Artifact name
      id: sanitize
      run: |
        SAFE_NAME=$(echo "${{ matrix.test_path }}" | sed 's#[/:<>|*?"\\\r\n]#-#g')
        echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT

    - name: Show build number
      run: |
        echo "Build number: ${{ github.run_id }}"

    - name: Upload coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-${{ steps.sanitize.outputs.safe_name }}
        path: ${{ matrix.test_path }}/TestResults/coverage.cobertura.xml

  merge-coverage:
    needs: coverage
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        path: coverage

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Merge
      run: |
        reportgenerator \
          -reports:"coverage/**/coverage.cobertura.xml" \
          -targetdir:"coverage-report" \
          -reporttypes:"Html;Cobertura"

    - uses: actions/upload-artifact@v4
      with:
        name: coverage-html
        path: coverage-report

    - name: Upload to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage-report/Cobertura.xml
        flags: unit_tests
        fail_ci_if_error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pack:
    if: ${{ inputs.run-pack }}
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

    - run: dotnet restore
    - run: dotnet build --configuration Release --no-restore
    - run: dotnet pack --configuration Release --no-build --no-restore

    - uses: actions/upload-artifact@v4
      with:
        name: NugetPackages
        path: src/libs/**/*.nupkg
